# FIX for Drive Root Conflict (Project on E:, SDK on C:)
# Disabling incremental compilation prevents the "different roots" error 
# when the project and the Flutter cache are on different drive letters.
kotlin.incremental=false
kotlin.incremental.js=false
kotlin.incremental.multiplatform=false

# --- HIGH PERFORMANCE BUILD SETTINGS ---
# Increased heap to 8GB and Metaspace to 4GB to speed up compilation 
# and prevent OutOfMemory errors during large AI model bundling.
org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError

# AndroidX migration flags (Required for modern v2 embedding)
android.useAndroidX=true
android.enableJetifier=true